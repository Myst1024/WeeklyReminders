replicaCount: 1
image:
  repository: ghcr.io/myst1024/weeklyreminders
  pullPolicy: IfNotPresent
  tag: "main"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: NodePort
  port: 32123
  targetPort: 32123
  nodePort: 32123

ingress:
  enabled: false

# Persistent storage for schedule.json
persistence:
  enabled: true
  storageClass: ""  # Use default storage class
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /app/data

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false

nodeSelector: {}

tolerations: []

affinity: {}

# Environment variables
env:
  HA_URL: "http://home-assistant.local:31013"
  # WEBHOOK_ID should be set during deployment via TrueNAS UI
  WEBHOOK_ID: ""
  # SERVER_URL is the URL Home Assistant will use to callback to this server
  # Default uses the Kubernetes service name (weekly-reminders) + port
  SERVER_URL: "http://192.168.1.11:32123"

# For sensitive values, use secrets instead
envFromSecret: {}
